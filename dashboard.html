<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
    <h1>📊 Dashboard</h1>

    <div class="card">
        <h2>👤 Profile</h2>
        <p id="userName"></p>
        <p id="userDept"></p>
        <p id="userSkills"></p>
    </div>

    <div class="card">
        <h2>🤝 Matches</h2>
        <ul id="matchList"></ul>
    </div>

    <div class="card">
        <h2>📈 Stats</h2>
        <p>Total Matches: <span id="totalMatches">0</span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
